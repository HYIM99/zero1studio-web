<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交付案例展示 | Zero1 Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0071e3;
            --dark: #1d1d1f;
            --light: #f5f5f7;
            --text-muted: #86868b;
            --wechat-green: #07c160;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
        body { background-color: #ffffff; color: var(--dark); line-height: 1.6; -webkit-font-smoothing: antialiased; padding-bottom: 60px; }
        
        /* 🍏 Cofolios 风格极简导航栏 */
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .nav-container { max-width: 1140px; margin: 0 auto; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        
        .logo-container { text-decoration: none; display: flex; flex-direction: column; }
        .logo-text { font-weight: 700; font-size: 1.4rem; color: var(--dark); letter-spacing: -0.5px; line-height: 1; }
        .logo-text span { color: var(--primary); }
        .logo-sub { font-size: 0.55rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

        .nav-menu { display: flex; gap: 32px; list-style: none; align-items: center; }
        .nav-menu a { text-decoration: none; color: var(--dark); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary); }
        
        .btn-cta { display: inline-block; background: var(--dark); color: white; padding: 10px 22px; border-radius: 980px; text-decoration: none; font-weight: 600; font-size: 0.85rem; }
        .btn-cta:hover { background: var(--primary); }

        /* 案例区布局 */
        .portfolio-section { max-width: 1140px; margin: 140px auto 80px; padding: 20px; }
        .section-title { font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 12px; text-align: center; }
        .section-subtitle { color: var(--text-muted); font-size: 1.25rem; font-weight: 400; max-width: 600px; margin: 0 auto 60px; text-align: center; letter-spacing: -0.2px; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 40px; }
        
        /* 🖼01 卡片架构 */
        .portfolio-card { background: var(--card-bg); border-radius: 28px; overflow: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
        .portfolio-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        /* 仿真浏览器外壳 */
        .web-browser-frame { background: #f5f5f7; border-radius: 24px 24px 0 0; overflow: hidden; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .web-browser-bar { background: #f5f5f7; padding: 14px 20px; display: flex; align-items: center; gap: 6px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }
        .browser-url { background: #ffffff; color: var(--text-muted); font-size: 0.8rem; padding: 5px 20px; border-radius: 8px; flex-grow: 1; margin-left: 15px; text-align: left; font-family: -apple-system, sans-serif; letter-spacing: 0.3px; box-shadow: inset 0 1px 2px rgba(0,0,0,0.01); }
