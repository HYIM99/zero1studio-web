<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero1 Studio | 控制台</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0071e3;
            --dark: #1d1d1f;
            --light: #f5f5f7;
            --white: #ffffff;
            --border: #d2d2d7;
            --danger: #ff453a;
            --success: #34c759;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        body { background-color: var(--light); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        /* 登录遮罩 */
        #login-overlay { position: fixed; inset: 0; background: var(--dark); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        #login-overlay input { padding: 12px; border-radius: 8px; border: none; width: 240px; margin-top: 20px; text-align: center; font-size: 1.1rem; }

        /* 侧边栏 */
        .sidebar { width: 260px; background: var(--dark); color: var(--white); padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; }
        .brand { font-size: 1.4rem; font-weight: 700; margin-bottom: 40px; padding-left: 10px; }
        .brand span { color: var(--primary); }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
        
        .menu-item { padding: 14px 18px; border-radius: 12px; cursor: pointer; color: #a1a1a6; font-weight: 600; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .menu-item:hover { background: rgba(255,255,255,0.05); }
        .menu-item.active { background: var(--primary); color: var(--white); }

        /* 主内容区 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(0,0,0,0.06); padding-bottom: 20px; }
        .header-bar h1 { font-size: 1.8rem; font-weight: 700; }
        
        .content-panel { display: none; background: var(--white); padding: 35px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .content-panel.active { display: block; animation: fadeIn 0.3s ease-out; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; color: #86868b; }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; background: #fafafa; transition: all 0.2s; }
        .form-group input:focus { border-color: var(--primary); background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
        
        /* 案例列表 */
        .case-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
        .case-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; background: #f9f9fb; border-radius: 16px; border: 1px solid #eee; }
        .case-info h4 { font-weight: 700; font-size: 1.05rem; }
        .case-info p { font-size: 0.85rem; color: #86868b; margin-top: 4px; }

        .btn-save { background: var(--primary); color: #fff; padding: 12px 28px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: #fff1f0; color: var(--danger); padding: 8px 14px; border-radius: 8px; border: 1px solid #ffccc7; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .btn-danger:hover { background: var(--danger); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 10px; }
            .brand { margin-bottom: 10px; text-align: center; }
            .menu-list { flex-direction: row; justify-content: center; }
            .menu-item { padding: 10px 12px; font-size: 0.85rem; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h2>Zero1 Studio 控制台</h2>
        <input type="password" id="admin-password" placeholder="输入管理密码后回车..." onkeydown="checkLogin(event)">
    </div>

    <div class="sidebar">
        <div class="brand">Zero<span>1</span> Console</div>
        <ul class="menu-list">
            <li id="menu-info" class="menu-item active" onclick="switchTab('info')">基本介绍</li>
            <li id="menu-cases" class="menu-item" onclick="switchTab('cases')">案例管理</li>
            <li id="menu-contact" class="menu-item" onclick="switchTab('contact')">联系方式</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="panel-info" class="content-panel active">
            <div class="header-bar">
                <h1>主页文字内容</h1>
                <button class="btn-save" id="btn-save-info" onclick="saveSiteInfo()">保存更新</button>
            </div>
            <div class="form-group">
                <label>主标题 (H1)</label>
                <input type="text" id="input-title" placeholder="例如：创造数字化可能">
            </div>
            <div class="form-group">
                <label>副标题描述 (Paragraph)</label>
                <textarea id="input-desc" rows="4" placeholder="关于工作室的简短介绍..."></textarea>
            </div>
        </div>

        <div id="panel-cases" class="content-panel">
            <div class="header-bar">
                <h1>交付案例</h1>
            </div>
            <div style="background: #fdfdfd; padding: 20px; border-radius: 16px; border: 1px dashed var(--border); margin-bottom: 30px;">
                <div class="form-group">
                    <label>新案例名称</label>
                    <input type="text" id="case-name" placeholder="项目名称">
                </div>
                <div class="form-group">
                    <label>案例简介</label>
                    <input type="text" id="case-desc" placeholder="一句话描述核心价值">
                </div>
                <button class="btn-save" style="width:100%" id="btn-add-case" onclick="addPortfolioCase()">确认发布新案例</button>
            </div>
            <h3 style="font-size: 1rem; margin-bottom: 15px;">已发布项目</h3>
            <div class="case-list" id="dom-case-list">
                <p style="color:#86868b;">正在加载云端数据...</p>
            </div>
        </div>

        <div id="panel-contact" class="content-panel">
            <div class="header-bar">
                <h1>联系与社交</h1>
                <button class="btn-save" id="btn-save-contact" onclick="saveContactInfo()">保存更新</button>
            </div>
            <div class="form-group">
                <label>微信号码</label>
                <input type="text" id="input-wechat">
            </div>
            <div class="form-group">
                <label>微信二维码图片文件名 (放在根目录)</label>
                <input type="text" id="input-qr" placeholder="qr-code.png">
            </div>
        </div>
    </div>

    <script>
        // 🚀 核心对齐：已完美更换为你最新执行 SQL 的 zero1studio 项目专属凭证
        const SUPABASE_URL = "https://ntimggwcoquvymtwesem.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50aW1nZ3djb3F1dnltdHdlc2VtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3Njk0MDUsImV4cCI6MjA4NjM0NTQwNX0.Ope-KJ2qqhx3vJMd0F7eGy36PUCpleNUEcPARf-IUgg"; 
        
        // 【已修复类名】：大写的 Supabase 确保初始化绝对不崩溃
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 管理员密码验证逻辑（密码 8888 畅行意国）
        function checkLogin(e) {
            if(e.key === 'Enter') {
                if(document.getElementById('admin-password').value === '8888') {
                    document.getElementById('login-overlay').style.display = 'none';
                    init();
                } else {
                    alert('密码错误');
                }
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            document.querySelectorAll('.content-panel').forEach(panel => panel.classList.remove('active'));
            document.getElementById('menu-' + tabId).classList.add('active');
            document.getElementById('panel-' + tabId).classList.add('active');
        }

        async function init() {
            await fetchSiteData();
            await fetchPortfolioCases();
        }

        // 获取主页基础配置
        async function fetchSiteData() {
            try {
                let { data, error } = await supabase.from('site_info').select('*').eq('id', 'zero1_main').maybeSingle();
                if (error) {
                    console.error("数据拉取中断:", error.message);
                    return;
                }
                if (data) {
                    document.getElementById('input-title').value = data.title || '';
                    document.getElementById('input-desc').value = data.description || '';
                    document.getElementById('input-wechat').value = data.wechat || '';
                    document.getElementById('input-qr').value = data.qr_code_url || '';
                }
            } catch (err) { console.error("读取失败", err); }
        }

        // 安全更新主页介绍（定向 update，绝不覆盖其他已有字段）
        async function saveSiteInfo() {
            const btn = document.getElementById('btn-save-info');
            btn.disabled = true;
            btn.innerText = "正在同步...";
            
            try {
                const { error } = await supabase
                    .from('site_info')
                    .update({
                        title: document.getElementById('input-title').value,
                        description: document.getElementById('input-desc').value
                    })
                    .eq('id', 'zero1_main');
                    
                if (error) alert("更新失败: " + error.message);
                else alert("🎉 主页文案更新已成功实时推送到云端！");
            } catch (e) {
                alert("发生未知错误: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "保存更新";
            }
        }

        // 安全更新联系方式（定向 update，绝不破坏文字介绍）
        async function saveContactInfo() {
            const btn = document.getElementById('btn-save-contact');
            btn.disabled = true;
            btn.innerText = "正在同步...";
            
            try {
                const { error } = await supabase
                    .from('site_info')
                    .update({
                        wechat: document.getElementById('input-wechat').value,
                        qr_code_url: document.getElementById('input-qr').value
                    })
                    .eq('id', 'zero1_main');
                    
                if (error) alert("更新失败: " + error.message);
                else alert("🎉 微信及物料路径已成功保存更新！");
            } catch (e) {
                alert("发生未知错误: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "保存更新";
            }
        }

        // 从云端数据库抓取交付案例
        async function fetchPortfolioCases() {
            const listContainer = document.getElementById('dom-case-list');
            if (!listContainer) return;

            try {
                const { data, error } = await supabase.from('portfolio_cases').select('*').order('id', { ascending: false });
                
                if (error) {
                    listContainer.innerHTML = `<p style="color:var(--danger);">⚠️ 加载失败: ${error.message}</p>`;
                    return;
                }
                
                listContainer.innerHTML = data.length ? '' : '<p style="color:#86868b;padding:10px;">云端暂无发布项目。</p>';
                data.forEach(item => {
                    listContainer.innerHTML += `
                        <div class="case-item">
                            <div class="case-info">
                                <h4>${item.name}</h4>
                                <p>${item.description || '暂无简介'}</p>
                            </div>
                            <button class="btn-danger" onclick="deleteCase(${item.id})">删除</button>
                        </div>
                    `;
                });
            } catch (err) {
                listContainer.innerHTML = "系统挂起异常";
            }
        }

        // 新增上架案例
        async function addPortfolioCase() {
            const btn = document.getElementById('btn-add-case');
            const name = document.getElementById('case-name').value;
            const desc = document.getElementById('case-desc').value;
            
            if(!name.trim()) return alert('案例名称不能为空');

            try {
                btn.disabled = true;
                btn.innerText = "正在发布...";
                
                const { error } = await supabase.from('portfolio_cases').insert([{ name: name, description: desc }]);
                if (error) alert("发布拒绝: " + error.message);
                else {
                    document.getElementById('case-name').value = '';
                    document.getElementById('case-desc').value = '';
                    alert("🎉 新案例已成功实时上架！");
                    await fetchPortfolioCases();
                }
            } catch (e) {
                alert("发布产生异常");
            } finally {
                btn.disabled = false;
                btn.innerText = "确认发布新案例";
            }
        }

        // 斩断案例发布：下架
        async function deleteCase(id) {
            if(!confirm('确定要从线上永久下架删除此案例吗？')) return;
            try {
                const { error } = await supabase.from('portfolio_cases').delete().eq('id', id);
                if (error) alert("删除失败: " + error.message);
                else await fetchPortfolioCases();
            } catch (e) {
                alert("删除异常");
            }
        }
    </script>
</body>
</html>
