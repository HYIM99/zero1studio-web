<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zero1 Studio | 控制台</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.png.JPG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #0071e3;
            --dark: #1d1d1f;
            --light: #f5f5f7;
            --white: #ffffff;
            --border: #d2d2d7;
            --success: #34c759;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--light); color: var(--dark); display: flex; height: 100vh; overflow: hidden; }

        /* 左侧侧边栏 */
        .sidebar { width: 260px; background: var(--dark); color: var(--white); padding: 30px 20px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; }
        .brand { font-size: 1.4rem; font-weight: 700; margin-bottom: 40px; padding-left: 10px; letter-spacing: -0.5px; }
        .brand span { color: var(--primary); }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        
        /* 极致优化 iPad 触控与高频防误触 */
        .menu-item { padding: 16px 20px; border-radius: 14px; cursor: pointer; color: #a1a1a6; font-weight: 600; transition: all 0.25s ease; -webkit-tap-highlight-color: transparent; user-select: none; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: var(--white); }
        .menu-item.active { background: var(--primary); color: var(--white); }

        /* 右侧核心面板内容区 */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        .header-bar h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .content-panel { display: none; background: var(--white); padding: 35px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.01); }
        .content-panel.active { display: block; animation: fadeIn 0.2s ease-out; }

        /* 统一高端表单间距 */
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; color: var(--dark); }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; font-size: 1rem; background: var(--light); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); background: var(--white); outline: none; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
        
        /* 数据异步展示列表面板 */
        .case-list { margin-top: 15px; display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .case-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--light); border-radius: 16px; border: 1px solid rgba(0,0,0,0.02); }
        .case-info h4 { font-weight: 700; font-size: 1.1rem; color: var(--dark); }
        .case-info p { font-size: 0.95rem; color: #86868b; margin-top: 6px; }

        /* 按钮与交互阻断器 */
        .btn-save { background: var(--primary); color: var(--white); padding: 14px 32px; border-radius: 12px; border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-save:active { transform: scale(0.98); }
        .btn-save:disabled { background: #d2d2d7; color: #86868b; cursor: not-allowed; transform: none; }
        .btn-danger { background: #ff453a; color: white; padding: 10px 16px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: background 0.2s; }
        .btn-danger:hover { background: #df3b32; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; padding: 15px; }
            .brand { margin-bottom: 0; }
            .menu-list { flex-direction: row; gap: 5px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="brand">Zero<span>1</span> Console</div>
            <ul class="menu-list">
                <li id="menu-info" class="menu-item active" onclick="switchTab('info')">基本介绍</li>
                <li id="menu-cases" class="menu-item" onclick="switchTab('cases')">案例管理</li>
                <li id="menu-contact" class="menu-item" onclick="switchTab('contact')">联系方式</li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        
        <div id="panel-info" class="content-panel active">
            <div class="header-bar">
                <h1>修改主页介绍</h1>
                <button class="btn-save" id="btn-save-info" onclick="saveSiteInfo()">保存更新</button>
            </div>
            <div class="form-group">
                <div class="form-group">
                    <label>主标题 (H1)</label>
                    <input type="text" id="input-title">
                </div>
                <div class="form-group">
                    <label>副标题描述 (Paragraph)</label>
                    <textarea id="input-desc" rows="4"></textarea>
                </div>
            </div>
        </div>

        <div id="panel-cases" class="content-panel">
            <div class="header-bar">
                <h1>交付案例管理</h1>
                <button class="btn-save" id="btn-add-case" onclick="addPortfolioCase()">发布新案例</button>
            </div>
            <div class="form-group" style="background: var(--light); padding: 24px; border-radius: 16px; margin-bottom: 25px; border: 1px dashed var(--border);">
                <div class="form-group">
                    <label>新增案例名称</label>
                    <input type="text" id="case-name" placeholder="例如：米兰打包店智能点餐系统">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>案例简介说明</label>
                    <input type="text" id="case-desc" placeholder="例如：帮店主全自动接单，锁客留存率提升40%">
                </div>
            </div>
            
            <h3 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 15px;">已有案例列表</h3>
            <div class="case-list" id="dom-case-list"></div>
        </div>

        <div id="panel-contact" class="content-panel">
            <div class="header-bar">
                <h1>联系方式与二维码</h1>
                <button class="btn-save" id="btn-save-contact" onclick="saveContactInfo()">保存更新</button>
            </div>
            <div class="form-group">
                <div class="form-group">
                    <label>微信号码</label>
                    <input type="text" id="input-wechat">
                </div>
                <div class="form-group">
                    <label>更换微信二维码图片链接</label>
                    <input type="text" id="input-qr" placeholder="IMG-0963.jpeg">
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. 初始化底座连接
        const SUPABASE_URL = "https://usawifozjkmgsyevtuzp.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzYXdpZm96amttZ3N5ZXZ0dXpwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3Njk0MDUsImV4cCI6MjA4NjM0NTQwNX0.Ope-KJ2qqhx3vJMd0F7eGy36PUCpleNUEcPARf-IUgg"; 
        
        let supabase;
        try {
            if (typeof Supabase !== 'undefined') {
                supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else {
                console.error("Supabase SDK 未能成功载入");
            }
        } catch(e) {
            console.error("Supabase 初始化底层报错: ", e);
        }

        // 2. ⚡ 强行解耦：纯前端隔离机制，保证 iPad 点击任何时候绝对不卡死、按得动
        function switchTab(tabId) {
            // 清除全部高亮状态
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            // 隐藏所有面板
            document.querySelectorAll('.content-panel').forEach(panel => panel.classList.remove('active'));
            
            // 精准唤醒选中目标
            const targetMenu = document.getElementById('menu-' + tabId);
            const targetPanel = document.getElementById('panel-' + tabId);
            
            if (targetMenu && targetPanel) {
                targetMenu.classList.add('active');
                targetPanel.classList.add('active');
            }
        }

        // 3. 异步平滑读取云端主页配置
        async function fetchSiteData() {
            if (!supabase) return;
            try {
                let { data, error } = await supabase.from('site_info').select('*').eq('id', 'zero1_main').maybeSingle();
                if (error) {
                    console.warn("读取 site_info 失败或表不存在，请检查 Supabase 字段: " + error.message);
                    return;
                }
                if (data) {
                    if (document.getElementById('input-title')) document.getElementById('input-title').value = data.title || '';
                    if (document.getElementById('input-desc')) document.getElementById('input-desc').value = data.description || '';
                    if (document.getElementById('input-wechat')) document.getElementById('input-wechat').value = data.wechat || '';
                    if (document.getElementById('input-qr')) document.getElementById('input-qr').value = data.qr_code_url || '';
                }
            } catch (err) { 
                console.error("fetchSiteData 抛出异常被成功拦截: " + err.message); 
            }
        }

        // 4. 异步读取后台管理案例列表
        async function fetchPortfolioCases() {
            if (!supabase) return;
            const listContainer = document.getElementById('dom-case-list');
            if(!listContainer) return;
            
            try {
                let { data, error } = await supabase.from('portfolio_cases').select('*').order('id', { ascending: false });
                if (error) {
                    listContainer.innerHTML = `<p style="color:#ff453a;font-size:0.9rem;padding:10px;">⚠️ 数据库读取受限: ${error.message}</p>`;
                    return;
                }
                
                listContainer.innerHTML = ''; 
                if (data && data.length > 0) {
                    data.forEach(item => {
                        listContainer.innerHTML += `
                            <div class="case-item" id="case-${item.id}">
                                <div class="case-info">
                                    <h4>${item.name}</h4>
                                    <p>${item.description || '暂无详细描述'}</p>
                                </div>
                                <button class="btn-danger" onclick="deleteCase(${item.id})">删除</button>
                            </div>
                        `;
                    });
                } else {
                    listContainer.innerHTML = '<p style="color:#86868b;font-size:0.9rem;padding:10px;">暂无云端上架案例。</p>';
                }
            } catch (err) { 
                listContainer.innerHTML = `<p style="color:#ff453a;font-size:0.9rem;padding:10px;">系统挂起错误: ${err.message}</p>`;
            }
        }

        // 5. 安全保存更新：主页文字介绍
        async function saveSiteInfo() {
            if (!supabase) return alert("无法保存：Supabase 基础组件未就绪");
            const btn = document.getElementById('btn-save-info');
            
            try {
                btn.innerText = "正在同步云端...";
                btn.disabled = true;

                const title = document.getElementById('input-title').value;
                const desc = document.getElementById('input-desc').value;

                const { error } = await supabase.from('site_info').upsert({ id: 'zero1_main', title: title, description: desc });
                
                if (error) alert("🚨 同步失败：" + error.message);
                else alert("🎉 官网主页介绍已成功实时同步至 Supabase 云端！");
            } catch(e) { 
                alert("异常中断: " + e.message); 
            } finally {
                btn.innerText = "保存更新";
                btn.disabled = false;
            }
        }

        // 6. 安全保存更新：联系方式与物料
        async function saveContactInfo() {
            if (!supabase) return alert("无法保存：Supabase 基础组件未就绪");
            const btn = document.getElementById('btn-save-contact');
            
            try {
                btn.innerText = "正在同步云端...";
                btn.disabled = true;

                const wechat = document.getElementById('input-wechat').value;
                const qr = document.getElementById('input-qr').value;

                const { error } = await supabase.from('site_info').upsert({ id: 'zero1_main', wechat: wechat, qr_code_url: qr });
                
                if (error) alert("🚨 写入失败：" + error.message);
                else alert("🎉 微信联系方式与图片路径已云同步成功！");
            } catch(e) { 
                alert("异常中断: " + e.message); 
            } finally {
                btn.innerText = "保存更新";
                btn.disabled = false;
            }
        }

        // 7. 新增案例发布
        async function addPortfolioCase() {
            if (!supabase) return alert("无法发布：数据库未就绪");
            const btn = document.getElementById('btn-add-case');
            const name = document.getElementById('case-name').value;
            const desc = document.getElementById('case-desc').value;
            
            if(!name.trim()) return alert('请输入交付案例名称');

            try {
                btn.innerText = "正在发布...";
                btn.disabled = true;

                const { error } = await supabase.from('portfolio_cases').insert([{ name: name, description: desc }]);
                if (error) {
                    alert("发布拒绝：" + error.message);
                } else {
                    document.getElementById('case-name').value = '';
                    document.getElementById('case-desc').value = '';
                    alert("🎉 新项目已成功上架数据库！");
                    fetchPortfolioCases(); 
                }
            } catch(e) { 
                alert("发布捕获异常: " + e.message); 
            } finally {
                btn.innerText = "发布新案例";
                btn.disabled = false;
            }
        }

        // 8. 斩断案例关联：安全删除
        async function deleteCase(id) {
            if (!supabase) return;
            try {
                if(!confirm('确定要从后台和前台永久删除这个交付案例吗？')) return;
                const { error } = await supabase.from('portfolio_cases').delete().eq('id', id);
                if (error) alert("删除受阻：" + error.message);
                else fetchPortfolioCases(); 
            } catch(e) { 
                alert("删除捕获异常: " + e.message); 
            }
        }

        // 🚀 初始化载入守卫：防堵塞无感异步唤醒
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                fetchSiteData();
                fetchPortfolioCases();
            }, 100);
        });
    </script>
</body>
</html>
