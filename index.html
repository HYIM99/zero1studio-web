<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero1 Studio | 意大利华人小店极速建站专家</title>
    
    <link rel="manifest" href="/manifest.json">
    
    <link rel="apple-touch-icon" href="/icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zero1">
    <style>
        :root {
            --primary: #0071e3; /* 苹果风科技蓝 */
            --dark: #1d1d1f;
            --light: #f5f5f7;
            --text-muted: #86868b;
            --wechat-green: #07c160; /* 微信绿 */
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; -webkit-font-smoothing: antialiased; }
        
        /* 导航栏 */
        header { background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); position: fixed; width: 100%; top: 0; z-index: 100; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .nav-container { max-width: 1000px; margin: 0 auto; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .logo-container { text-decoration: none; display: flex; flex-direction: column; }
        .logo-text { font-weight: 700; font-size: 1.4rem; color: var(--dark); letter-spacing: -0.5px; line-height: 1; }
        .logo-text span { color: var(--primary); }
        .logo-sub { font-size: 0.55rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-top: 2px; }

        /* 导航菜单样式 */
        .nav-menu { display: flex; gap: 25px; list-style: none; align-items: center; }
        .nav-menu a { text-decoration: none; color: var(--dark); font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
        .nav-menu a:hover, .nav-menu a.active { color: var(--primary); }

        /* 主视觉区 */
        .hero { max-width: 1000px; margin: 160px auto 60px; padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .icon-badge { width: 56px; height: 56px; border: 6px solid var(--dark); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; }
        .icon-badge::after { content: ''; width: 6px; height: 36px; background: var(--primary); border-radius: 3px; position: absolute; }
        .hero h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: -1px; margin-bottom: 20px; line-height: 1.3; }
        .hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 650px; margin: 0 auto 30px; }
        
        /* 微信联动按钮样式 */
        .btn-cta { display: inline-block; background: var(--wechat-green); color: white; padding: 14px 35px; border-radius: 980px; text-decoration: none; font-weight: 600; transition: all 0.2s; box-shadow: 0 4px 15px rgba(7,193,96,0.3); border: none; cursor: pointer; }
        .btn-cta:hover { opacity: 0.9; transform: scale(1.02); }

        /* 首页简版案例过渡区 */
        .portfolio-intro { max-width: 1000px; margin: 0 auto 100px; padding: 60px 20px; background: white; border-radius: 32px; text-align: center; box-shadow: 0 4px 30px rgba(0,0,0,0.02); }
        .portfolio-intro h2 { font-size: 2rem; font-weight: 700; margin-bottom: 15px; }
        .portfolio-intro p { color: var(--text-muted); max-width: 600px; margin: 0 auto 30px; font-size: 1.05rem; }
        .btn-secondary { display: inline-block; background: var(--dark); color: white; padding: 12px 30px; border-radius: 12px; text-decoration: none; font-weight: 600; transition: background 0.2s; }
        .btn-secondary:hover { background: var(--primary); }

        footer { max-width: 1000px; margin: 0 auto; padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .icon-switch { width: 36px; height: 36px; border: 4px solid var(--primary); border-radius: 50%; border-top-color: transparent; position: relative; display: flex; justify-content: center; }
        .icon-switch::after { content: ''; width: 4px; height: 16px; background: var(--primary); border-radius: 2px; position: absolute; top: -4px; }

        /* 微信弹窗高级样式 */
        .wechat-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 10000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .wechat-modal.show { opacity: 1; pointer-events: auto; }
        .wechat-box { background: white; padding: 30px; border-radius: 24px; text-align: center; max-width: 320px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: scale(0.9); transition: transform 0.3s ease; }
        .wechat-modal.show .wechat-box { transform: scale(1); }
        .wechat-box h3 { font-size: 1.25rem; margin-bottom: 5px; font-weight: 700; }
        .wechat-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
        .qr-code { width: 220px; height: auto; background: #fff; margin: 0 auto 20px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); padding: 5px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .qr-code img { width: 100%; height: auto; display: block; }
        .btn-close-modal { background: var(--light); color: var(--dark); padding: 10px 20px; border-radius: 10px; border: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; width: 100%; transition: background 0.2s; }
        .btn-close-modal:hover { background: #e2e2e7; }

        /* GDPR 悬浮弹窗 */
        .gdpr-banner { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(150%); width: 90%; max-width: 500px; background-color: #ffffff; color: #333333; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 9999; display: flex; flex-direction: column; gap: 12px; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border: 1px solid rgba(0,113,227,0.15); }
        .gdpr-banner.show { transform: translateX(-50%) translateY(0); }
        .gdpr-text { font-size: 0.85rem; line-height: 1.4; text-align: left; }
        .gdpr-btn-group { display: flex; justify-content: flex-end; gap: 10px; }
        .gdpr-btn-accept { padding: 8px 20px; background-color: var(--primary); color: #ffffff; font-size: 0.85rem; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
        .gdpr-btn-accept:hover { background-color: var(--dark); }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hero h1 { font-size: 2rem; }
            .hero p { font-size: 1.05rem; }
            .gdpr-banner { bottom: 10px; padding: 15px; }
        }
    </style>
</head>

<script>
    // 微信弹窗控制 JS 代码（保持你原来的逻辑）
    function openWeChatModal(e) {
        e.preventDefault();
        document.getElementById('wechatModal').classList.add('show');
    }
    function closeWeChatModal(e) {
        document.getElementById('wechatModal').classList.remove('show');
    }
